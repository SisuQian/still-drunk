<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>酒还没醒</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f5efe6 0%, #ece3d5 100%);
      color: #1f1a17;
      min-height: 100vh;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px 72px;
    }

    .hero {
      margin-bottom: 36px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(36px, 6vw, 56px);
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .subtitle {
      margin: 0;
      font-size: 17px;
      line-height: 1.7;
      color: #514740;
    }

    .card {
      background: rgba(255, 252, 247, 0.82);
      border: 1px solid rgba(60, 40, 25, 0.12);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(65, 48, 35, 0.08);
      backdrop-filter: blur(6px);
      margin-bottom: 20px;
    }

    .section-title {
      margin: 0 0 18px;
      font-size: 18px;
      line-height: 1.4;
    }

    .form-grid {
      display: grid;
      gap: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #5a4b43;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input,
    textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #d8cab8;
      background: #fffdfa;
      color: #241d19;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    textarea:focus {
      border-color: #9f6b45;
      box-shadow: 0 0 0 3px rgba(159, 107, 69, 0.12);
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    .button-row {
      padding-top: 4px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      background: #7a3f22;
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.94;
      transform: translateY(-1px);
    }

    .result-box {
      display: none;
      border-top: 1px solid rgba(60, 40, 25, 0.1);
      margin-top: 18px;
      padding-top: 18px;
    }

    .status-line {
      font-size: 24px;
      line-height: 1.4;
      margin: 0 0 12px;
    }

    .quote {
      margin: 0;
      font-size: 16px;
      line-height: 1.8;
      color: #4c4039;
    }

    .quote-source {
      display: block;
      margin-top: 10px;
      font-size: 13px;
      color: #78665d;
    }

    .history-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 14px;
    }

    .history-item {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(60, 40, 25, 0.08);
    }

    .history-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      font-size: 13px;
      color: #7b6a61;
      margin-bottom: 10px;
    }

    .history-drink {
      margin: 0 0 8px;
      font-size: 17px;
    }

    .history-mood,
    .history-status {
      margin: 0;
      line-height: 1.7;
      color: #403732;
    }

    .empty {
      margin: 0;
      color: #7b6a61;
      line-height: 1.7;
    }

    .summary-box {
      display: grid;
      gap: 14px;
    }

    .summary-text {
      margin: 0;
      line-height: 1.8;
      color: #403732;
    }

    @media (max-width: 640px) {
      .page {
        padding-top: 36px;
      }

      .card {
        padding: 18px;
        border-radius: 18px;
      }

      .status-line {
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>酒还没醒</h1>
      <p class="subtitle">记录生活中的阿波罗与狄俄尼索斯。</p>
    </section>

    <section class="card">
      <h2 class="section-title">今晚记一笔</h2>

      <div class="form-grid">
        <div>
          <label for="drinkName">喝了什么</label>
          <input id="drinkName" type="text" placeholder="例如：啤酒、葡萄酒、威士忌（记下品牌/种类）" />
        </div>

        <div>
          <label for="drinkAmount">喝了多少</label>
          <input id="drinkAmount" type="text" placeholder="例如：一瓶、两杯、三斤（记下数量）" />
        </div>

        <div>
          <label for="moodText">心情描述</label>
          <textarea id="moodText" placeholder="例如：音乐停了，有点困（记下感受）"></textarea>
        </div>

        <div class="button-row">
          <button id="generateBtn">生成今晚状态</button>
        </div>
      </div>

      <div id="resultBox" class="result-box">
        <p id="statusLine" class="status-line"></p>
        <div class="quote">
          <p id="quoteTextZh" style="margin:0 0 8px;"></p>
          <p id="quoteTextEn" style="margin:0;"></p>
          <span id="quoteSource" class="quote-source"></span>
        </div>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">最近几次饮酒记忆</h2>
      <ul id="historyList" class="history-list"></ul>
      <p id="emptyState" class="empty">还没有记录。今晚这一杯，会成为第一条。</p>
    </section>

    <section class="card">
      <h2 class="section-title">饮酒总量统计</h2>
      <div class="summary-box">
        <div class="button-row">
          <button id="summaryBtn">计算过去的总量与时间</button>
        </div>
        <p id="summaryText" class="summary-text">点击按钮后，将在这里显示：在过去……天里，你总共喝了：……。</p>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "jiuHaiMeiXingRecords";

    const drinkNameInput = document.getElementById("drinkName");
    const drinkAmountInput = document.getElementById("drinkAmount");
    const moodTextInput = document.getElementById("moodText");
    const generateBtn = document.getElementById("generateBtn");

    const resultBox = document.getElementById("resultBox");
    const statusLine = document.getElementById("statusLine");
    const quoteTextZh = document.getElementById("quoteTextZh");
    const quoteTextEn = document.getElementById("quoteTextEn");
    const quoteSource = document.getElementById("quoteSource");

    const historyList = document.getElementById("historyList");
    const emptyState = document.getElementById("emptyState");
    const summaryBtn = document.getElementById("summaryBtn");
    const summaryText = document.getElementById("summaryText");

    const quoteLibrary = [
      {
        zh: "我们都身处泥泞，但总有人在仰望星空。",
        en: "We are all in the gutter, but some of us are looking at the stars.",
        source: "— Oscar Wilde, Lady Windermere's Fan"
      },
      {
        zh: "诗人是一种生命状态，而非一种职业。",
        en: "To be a poet is a condition, not a profession.",
        source: "— Robert Frost"
      },
      {
        zh: "我们唯一能决定的，是如何度过被赋予的时光。",
        en: "All we have to decide is what to do with the time that is given us.",
        source: "— J.R.R. Tolkien, The Lord of the Rings"
      },
      {
        zh: "你必须不停地奔跑，才能留在原地。",
        en: "It takes all the running you can do, to keep in the same place.",
        source: "— Lewis Carroll, Through the Looking-Glass"
      },
      {
        zh: "与其苟延残喘，不如从此燃烧。",
        en: "It's better to burn out than to fade away.",
        source: "— Neil Young, My My, Hey Hey (Out of the Blue)"
      }
    ];

    function loadRecords() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        return [];
      }

      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        console.warn("历史记录解析失败，已重置为空数组。", error);
        return [];
      }
    }

    function saveRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function formatTime(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function getStatusLevel(amountText, moodText) {
      const amount = amountText.trim();
      const mood = moodText.trim();

      const lightHints = ["一点", "一瓶", "两杯", "一杯", "微醺", "还好"];
      const deepHints = ["很多", "一箱", "四杯", "五杯", "记不清", "五瓶", "失眠", "难过", "崩溃", "醉", "烂醉"];

      if (deepHints.some(function(word) {
        return amount.includes(word) || mood.includes(word);
      })) {
        return "deep";
      }

      if (lightHints.some(function(word) {
        return amount.includes(word) || mood.includes(word);
      })) {
        return "light";
      }

      return "medium";
    }

    function buildStatusSentence(drinkName, amountText, moodText, level) {
      const mood = moodText.trim();
      const amount = amountText.trim();

      if (level === "light") {
        return `今晚喝的是${drinkName}，喝了${amount}。${mood || "夜晚仍有余地。"}`;
      }

      if (level === "medium") {
        return `今晚喝的是${drinkName}，喝了${amount}。${mood || "世界开始变得柔软。"}`;
      }

      return `今晚喝的是${drinkName}，喝了${amount}。${mood || "明天醒来，又将是美好的一天。"}`;
    }

    function pickQuote() {
      return quoteLibrary[Math.floor(Math.random() * quoteLibrary.length)];
    }

    function renderHistory() {
      const records = loadRecords();
      historyList.innerHTML = "";

      if (records.length === 0) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      records.slice().reverse().forEach(function(record) {
        const item = document.createElement("li");
        item.className = "history-item";

        item.innerHTML = `
          <div class="history-meta">
            <span>${formatTime(record.createdAt)}</span>
            <span>${record.amountText}</span>
          </div>
          <p class="history-drink">${record.drinkName}</p>
          <p class="history-mood">心情：${record.moodText || "未填写"}</p>
          <p class="history-status">状态：${record.status}</p>
        `;

        historyList.appendChild(item);
      });
    }

    function buildSummaryText() {
      const records = loadRecords();

      if (records.length === 0) {
        summaryText.textContent = "还没有历史记录，暂时无法统计。";
        return;
      }

      const sortedRecords = records.slice().sort(function(a, b) {
        return new Date(a.createdAt) - new Date(b.createdAt);
      });

      const firstDate = new Date(sortedRecords[0].createdAt);
      const now = new Date();
      const diffMs = now - firstDate;
      const diffDays = Math.max(1, Math.ceil(diffMs / (1000 * 60 * 60 * 24)));

      const totalAmount = sortedRecords.map(function(record) {
        return `${record.amountText}${record.drinkName}`;
      }).join("、");

      summaryText.textContent = `在过去${diffDays}天里，你总共喝了：${totalAmount}。`;
    }

    function handleGenerate() {
      const drinkName = drinkNameInput.value.trim();
      const amountText = drinkAmountInput.value.trim();
      const moodText = moodTextInput.value.trim();

      if (!drinkName) {
        alert("请先写下喝了什么。");
        return;
      }

      if (!amountText) {
        alert("请写下喝了多少。");
        return;
      }

      const level = getStatusLevel(amountText, moodText);
      const status = buildStatusSentence(drinkName, amountText, moodText, level);
      const quote = pickQuote();

      statusLine.textContent = status;
      quoteTextZh.textContent = `“${quote.zh}”`;
      quoteTextEn.textContent = `“${quote.en}”`;
      quoteSource.textContent = quote.source;
      resultBox.style.display = "block";

      const records = loadRecords();
      records.push({
        drinkName: drinkName,
        amountText: amountText,
        moodText: moodText,
        status: status,
        createdAt: new Date().toISOString()
      });

      saveRecords(records);
      renderHistory();
    }

    function runSelfTests() {
      console.assert(Array.isArray(quoteLibrary), "quoteLibrary 应该是数组");
      console.assert(quoteLibrary.length >= 5, "quoteLibrary 至少应包含 5 条引用");
      console.assert(quoteLibrary.every(function(item) {
        return item && item.zh && item.en && item.source;
      }), "每条引用都应包含 zh、en、source");
      console.assert(getStatusLevel("一杯", "还好") === "light", "轻度状态判断失败");
      console.assert(getStatusLevel("很多", "失眠") === "deep", "深度状态判断失败");
      console.assert(getStatusLevel("三杯", "普通") === "medium", "中度状态判断失败");
      console.assert(buildStatusSentence("威士忌", "两杯", "", "light").includes("威士忌"), "状态文案应包含酒名");
      console.assert(buildStatusSentence("啤酒", "一箱", "", "deep").includes("一箱"), "状态文案应包含数量");
    }

    generateBtn.addEventListener("click", handleGenerate);
    summaryBtn.addEventListener("click", buildSummaryText);
    renderHistory();
    runSelfTests();
  </script>
</body>
</html>
